name: CI

on:
  push:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.spec.js'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.spec.js'
      - '.github/workflows/**'

jobs:
  test:
    name: Run tests for ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
        project: [chromium, firefox, webkit, edge, pixel5, iphone13, ipad-gen7]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with dependencies)
        run: npx playwright install --with-deps

      - name: Run Playwright tests for project
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: |
          echo "Running tests for project: ${{ matrix.project }}"
          if npm run | grep -q "test:playwright"; then
            npm run test:playwright --silent -- --project=${{ matrix.project }}
          else
            npx playwright test --project=${{ matrix.project }} --reporter=list
          fi

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
            *.png
            *.json
