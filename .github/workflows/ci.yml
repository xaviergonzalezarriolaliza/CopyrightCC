name: CI

on:
  push:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.spec.js'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.spec.js'
      - '.github/workflows/**'
  # Allow manual runs from the Actions UI or `gh workflow run`
  workflow_dispatch:

jobs:
  test:
    name: Run tests for ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        node-version: [18.x]
        project: [chromium, firefox, webkit, edge, pixel5, iphone13, ipad-gen7]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with dependencies)
        run: npx playwright install --with-deps

      - name: Run Playwright tests for project
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: |
          echo "Running tests for project: ${{ matrix.project }}"
          if npm run | grep -q "test:playwright"; then
            npm run test:playwright --silent -- --project=${{ matrix.project }} --reporter=list
          else
            npx playwright test --project=${{ matrix.project }} --reporter=list
          fi

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Make the artifact name unique per matrix project to avoid 409 conflicts
          # include run id and job to guarantee uniqueness across parallel jobs and reruns
          name: playwright-artifacts-${{ matrix.project }}-run${{ github.run_id }}-${{ github.job }}
          path: |
            test-results
            # keep playwright-report if present but HTML generation disabled in CI
            playwright-report
            *.png
            *.json
            coverage

  publish-pages:
    name: Publish Playwright HTML report to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download Chromium report artifact
        uses: actions/download-artifact@v4
        with:
          # artifact name created by test job for chromium project
          name: playwright-artifacts-chromium-run${{ github.run_id }}-test
          path: site

      - name: Publish report to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/playwright-report
          # optional: set target branch (default is gh-pages)
          publish_branch: gh-pages
          allow_empty_commit: true
